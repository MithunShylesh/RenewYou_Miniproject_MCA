      <table class="table table-hover table-bordered text-center align-middle shadow">

        <thead class="table-dark">

            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Date</th>
            <th>Message</th>
          </tr>
        </thead>

        <tbody>
          {% for a in appointments %}
          <tr>
            <td>{{ a.name }}</td>
            <td>{{ a.email }}</td>
            <td>{{ a.phone }}</td>
            <td>{{ a.date|date:"M d, Y" }}</td>
            <td><span class="badge bg-info text-dark">{{ a.message }}</span></td>
          </tr>
          {% endfor %}
        </tbody>

      </table>
